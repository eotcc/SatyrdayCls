<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deacons PDFs</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color: #f8f8f8;
    margin: 20px;
}

h1{
    text-align: center;
    color: navy;
}

table{
    width: 80%;
    margin: auto;
    border-collapse: collapse;
    background-color: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

th{
    background-color: navy;
    color: white;
    padding: 12px;
}

td{
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}

tr:nth-child(even){
    background-color: #f2f2f2;
}

tr:hover{
    background-color: #e6e6e6;
}

a{
    text-decoration: none;
    background-color: gold;
    color: black;
    padding: 6px 12px;
    border-radius: 4px;
    font-weight: bold;
}

a:hover{
    background-color: orange;
}
</style>

</head>
<body>

<h1>Deacons Lessons</h1>

<table>
    <thead>
        <tr>
            <th>Lesson</th>
            <th>Open PDF</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>Lesson 1</td>
            <td><a href="Alphabet.docx" target="_blank">Open</a></td>
        </tr>
    </tbody>
</table>

</body>
</html>
